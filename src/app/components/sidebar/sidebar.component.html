<aside class="sidebar">

  <!-- DASHBOARD (entrada principal fija) -->
  <div class="menu-header" style="cursor: pointer;" (click)="goDashboard()">
    <span class="emoji-icon">📊</span>
    <span>Dashboard</span>
  </div>

  <!-- REPORTES (entrada principal fija) -->
  <div class="menu-header" style="cursor: pointer;" (click)="goReportes()">
    <span class="emoji-icon">📋</span>
    <span>Reportes</span>
  </div>

  <!-- ITEMS DINÁMICOS DESDE BACKEND -->
  <div class="menu-item" *ngFor="let item of items">

    <div class="menu-header" (click)="toggle(item)">
      <span class="emoji-icon">{{ iconoPara(item) }}</span>
      <span>{{ item.label }}</span>
      <!-- La flecha solo aparece si el item tiene subitems para expandir.
           Antes se mostraba siempre, lo cual confundía al usuario en items
           que eran enlaces directos sin hijos. -->
      <i class="arrow"
         *ngIf="item.subitems?.length"
         [class.rotate]="item.expanded">▸</i>
    </div>

    <div class="submenu" *ngIf="item.expanded">
      <div
        class="submenu-item"
        *ngFor="let sub of item.subitems"
        (click)="navigate(sub, $event)">
        <span class="emoji-icon-sm">{{ iconoPara(sub) }}</span>
        <span>{{ sub.label }}</span>
      </div>
    </div>

  </div>

</aside>
