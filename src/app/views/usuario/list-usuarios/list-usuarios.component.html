<div class="loading-overlay" *ngIf="isLoading$ | async">
    <app-loading-dancing-squares [size]="22" [gap]="8"></app-loading-dancing-squares>
</div>

<div class="container-fluid mt-2">
  <div class="bar-buttons-top w-100">
    <div class="title-f6">Lista de Usuarios</div>
  </div>
  <div class="bar-buttons-top d-flex justify-content-end w-100">
    <button (click)="onNewUser()" class="general-button btn-primary me-2"
      *hasPermission="{ route: '/list-usuarios', action: 'permitCreate' }">
      <i class="fas fa-plus"></i>
      Nuevo Usuario
    </button>
    <button class="general-button btn-secondary" (click)="onBack()">
      <i class="fas fa-arrow-left"></i>
      Regresar
    </button>
  </div>
</div>
<div class="table-container table-responsive">
  <table class="table global-table table-striped table-hover">
    <thead>
      <th class="text-center">Username</th>
      <th class="text-center">Apellido Paterno</th>
      <th class="text-center">Apellido Materno</th>
      <th class="text-center">Nombres</th>
      <th class="text-center">Estado</th>
      <th class="text-center">Perfil</th>
      <th class="text-center">Acciones</th>
    </thead>
    <tbody>
      <tr *ngFor="let reg of usuarios">
        <td class="text-center">{{reg.userUsername}}</td>
        <td class="text-start">{{reg.userLastName}}</td>
        <td class="text-start">{{reg.userMiddleName}}</td>
        <td class="text-start">{{reg.userName}}</td>
        <td class="text-center">{{reg.userStatus}}</td>
        <td class="text-center">{{reg.profileShortName}}</td>
        <td class="text-center">
          <button (click)="onEditUser(reg.userId!)" type="button" title="Editar Usuario" 
            type="button" class="btn btn-warning btn-sm me-1" 
            *hasPermission="{ route: '/list-usuarios', action: 'permitEdit' }">
            <i class="fa fa-edit"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
