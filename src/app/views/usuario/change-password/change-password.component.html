<div class="loading-overlay" *ngIf="isLoading$ | async">
  <app-loading-dancing-squares [size]="22" [gap]="8"></app-loading-dancing-squares>
</div>

<div class="container-fluid mt-2">
  <div class="bar-buttons-top w-100">
    <div class="title-f6">Cambiar Contraseña</div>
  </div>
  <div class="bar-buttons-top d-flex justify-content-end w-100">
    <button (click)="onSave()" class="general-button btn-primary me-2" [disabled]="!canSubmit || isSubmitting">
      <i class="fas fa-save"></i>
      Guardar
    </button>
    <button (click)="onBack()" class="general-button btn-secondary">
      <i class="fas fa-arrow-left"></i>
      Regresar
    </button>
  </div>
</div>

<div class="row mb-3">
  <div class="col-md-4">
    <label class="form-label fw-semibold mb-2 d-block" for="currentPassword">Contraseña Actual</label>
    <div class="input-group">
      <input
        class="form-control"
        id="currentPassword"
        name="currentPassword"
        [type]="showCurrent ? 'text' : 'password'"
        autocomplete="current-password"
        (keydown)="onCapsLock($event)"
        (keyup)="onCapsLock($event)"
        (blur)="clearCapsLock()"
        [(ngModel)]="currentPassword" />
      <button class="input-group-text" type="button" (click)="showCurrent = !showCurrent">
        <i [class]="showCurrent ? 'fas fa-eye' : 'fas fa-eye-slash'"></i>
      </button>
    </div>
  </div>
  <div class="col-md-4">
    <label class="form-label fw-semibold mb-2 d-block" for="newPassword">Nueva Contraseña</label>
    <div class="input-group">
      <input
        class="form-control"
        id="newPassword"
        name="newPassword"
        [type]="showNew ? 'text' : 'password'"
        autocomplete="new-password"
        (keydown)="onCapsLock($event)"
        (keyup)="onCapsLock($event)"
        (blur)="clearCapsLock()"
        [class.is-valid]="!!newPassword && !!confirmPassword && !passwordsMismatch"
        [class.is-invalid]="!!newPassword && !!confirmPassword && passwordsMismatch"
        [(ngModel)]="newPassword" />
      <button class="input-group-text" type="button" (click)="showNew = !showNew">
        <i [class]="showNew ? 'fas fa-eye' : 'fas fa-eye-slash'"></i>
      </button>
    </div>
  </div>
  <div class="col-md-4">
    <label class="form-label fw-semibold mb-2 d-block" for="confirmPassword">Confirmar Contraseña</label>
    <div class="input-group">
      <input
        class="form-control"
        id="confirmPassword"
        name="confirmPassword"
        [type]="showConfirm ? 'text' : 'password'"
        autocomplete="new-password"
        (keydown)="onCapsLock($event)"
        (keyup)="onCapsLock($event)"
        (blur)="clearCapsLock()"
        [class.is-valid]="!!newPassword && !!confirmPassword && !passwordsMismatch"
        [class.is-invalid]="!!newPassword && !!confirmPassword && passwordsMismatch"
        [(ngModel)]="confirmPassword" />
      <button class="input-group-text" type="button" (click)="showConfirm = !showConfirm">
        <i [class]="showConfirm ? 'fas fa-eye' : 'fas fa-eye-slash'"></i>
      </button>
    </div>
  </div>
</div>

<div class="row" *ngIf="capsLockOn">
  <div class="col-12">
    <div class="caps-warning">
      Caps Lock activado.
    </div>
  </div>
</div>
