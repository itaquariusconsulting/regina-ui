<div class="container-fluid mt-2">
    <div class="bar-buttons-top w-100">
        <div class="title-f6">Lista de Reglas de Validacion</div>
    </div>
    <div class="bar-buttons-top d-flex justify-content-end w-100">
        <button (click)="onNewValidacion()" class="general-button btn-primary me-2"
            *hasPermission="{ route: '/list-validaciones', action: 'permitCreate' }">
            <i class="fas fa-plus"></i>
            Nueva Regla
        </button>
        <button class="general-button btn-secondary">
            <i class="fas fa-arrow-left"></i>
            Regresar
        </button>
    </div>
</div>
<div class="table-container table-responsive">
    <table class="table global-table table-striped table-hover">
        <thead>
            <th class="text-center">ID</th>
            <th class="text-center">Nombre Regla</th>
            <th class="text-center">Sección Documento</th>
            <th class="text-center">Estado</th>
            <th class="text-center">Acciones</th>
        </thead>
        <tbody>
            <tr style="vertical-align: middle;" *ngFor="let reg of validaciones">
                <td class="text-center">{{reg.idRule}}</td>
                <td class="text-start">{{reg.ruleName?.toUpperCase() }}</td>
                <td class="text-center">{{reg.documentSection}}</td>
                <td class="text-center">
                    <button style="font-size: 0.7rem; cursor: default !important;" class="general-button btn-sm"
                        [ngClass]="reg.isActive ? 'btn-primary' : 'btn-danger'">
                        {{ reg.isActive ? 'ACTIVA' : 'INACTIVA' }}
                    </button>
                </td>
                <td class="text-center">
                    <button type="button" title="Editar Regla" type="button" class="btn btn-warning btn-sm">
                        <i class="fa fa-edit"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
