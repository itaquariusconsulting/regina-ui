<div class="loading-overlay" *ngIf="isLoading$ | async">
  <app-loading-dancing-squares [size]="22" [gap]="8"></app-loading-dancing-squares>
</div>
<div class="container-fluid mt-2">
  <div class="bar-buttons-top w-100">
    <div class="title-f6">Configuración de Permisos</div>
  </div>

  <div class="d-flex align-items-end gap-2 flex-wrap w-100 mt-2">
    <div class="flex-grow-1">
      <label class="form-label fw-semibold mb-2">Seleccione Perfil: </label>
      <select class="form-select" (change)="onProfileChange($any($event.target).value)">
        <option value="">-- Seleccione --</option>
        <option *ngFor="let p of profiles" [value]="p.profileId">
          {{ p.profileLongName }}
        </option>
      </select>
    </div>
    <button type="button" class="general-button btn-primary btn-sm" [disabled]="!selectedProfileId"
      (click)="savePermissions()">
      <i class="fas fa-save"></i> Guardar
    </button>
  </div>

  <div class="table-container mt-3" *ngIf="permissionMatrix.length > 0">
    <table class="matrix-table table-hover">
      <thead>
        <tr>
          <th style="text-align: left; padding-left: 15px;">Menú / Módulo</th>
          <th style="text-align: left;">Ver</th>
          <th style="text-align: left;">Crear</th>
          <th style="text-align: left;">Editar</th>
          <th style="text-align: left;">Eliminar</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of permissionMatrix" [class.is-parent]="!item.menuParentId">
          <td [style.padding-left.px]="item.menuParentId ? 30 : 10">
            <i [class]="item.menuIcon"></i>
            {{ item.menuLabel }}
          </td>
          <td>
            <input type="checkbox" [(ngModel)]="item.permitView" (change)="onPermissionChange(item, 'permitView')">
          </td>
          <td>
            <input type="checkbox" [(ngModel)]="item.permitCreate" (change)="onPermissionChange(item, 'permitCreate')">
          </td>
          <td>
            <input type="checkbox" [(ngModel)]="item.permitEdit" (change)="onPermissionChange(item, 'permitEdit')">
          </td>
          <td>
            <input type="checkbox" [(ngModel)]="item.permitDelete" (change)="onPermissionChange(item, 'permitDelete')">
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
